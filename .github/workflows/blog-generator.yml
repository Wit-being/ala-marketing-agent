name: Blog Post Generator

on:
  schedule:
    - cron: '0 10 * * 1,3,5'  # Mon/Wed/Fri at 10 AM UTC = 11 AM BST / 6 AM EST
  workflow_dispatch:

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ala-marketing-agent repo
        uses: actions/checkout@v4

      - name: Checkout ala-website repo
        uses: actions/checkout@v4
        with:
          repository: Wit-being/ala-website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: ala-website

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq

      - name: Generate and commit blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit and push blog post
        working-directory: ala-website
        run: |
          git config user.name "Àlá Marketing Agent"
          git config user.email "support@alaapp.site"
          git add content/blog/
          git diff --staged --quiet || git commit -m "Auto: Add new blog post"
          git push
